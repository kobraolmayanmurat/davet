<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bir Soru Var 🍷</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0a14;
      font-family: 'Inter', system-ui, sans-serif;
      color: #f0e6ff;
      overflow: hidden;
      position: relative;
    }

    /* ── Particles ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(90px);
      opacity: 0.18; pointer-events: none; z-index: 0;
      animation: orbPulse 7s ease-in-out infinite alternate;
    }
    .orb1 { width: 420px; height: 420px; background: #7c3aed; top: -120px; left: -120px; }
    .orb2 { width: 360px; height: 360px; background: #db2777; bottom: -90px; right: -90px; animation-delay: 2.5s; }
    .orb3 { width: 260px; height: 260px; background: #9333ea; top: 45%; left: 58%; animation-delay: 5s; }
    @keyframes orbPulse {
      from { transform: scale(1);   opacity: 0.14; }
      to   { transform: scale(1.3); opacity: 0.26; }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: min(92vw, 460px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      backdrop-filter: blur(22px);
      padding: 2.8rem 2.2rem;
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.12),
        0 32px 80px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.07);
      animation: cardEntrance 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Steps ── */
    .step { display: none; flex-direction: column; align-items: center; text-align: center; gap: 0; }
    .step.active {
      display: flex;
      animation: stepIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .step.exit { animation: stepOut 0.28s ease forwards; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(32px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes stepOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-22px); }
    }

    /* ── Progress ── */
    .progress { display: flex; gap: 8px; justify-content: center; margin-bottom: 2.2rem; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.13);
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .dot.active { background: #a855f7; box-shadow: 0 0 12px rgba(168,85,247,0.7); width: 26px; border-radius: 4px; }
    .dot.done   { background: rgba(168,85,247,0.4); }

    /* ── Emoji ── */
    .emoji {
      font-size: 3.4rem; margin-bottom: 1.2rem; display: block;
      animation: emojiBounce 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
      position: relative;
    }
    @keyframes emojiBounce {
      from { transform: scale(0) rotate(-25deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .emoji-pulse { animation: emojiBounce 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.15s both, emojiPulse 2.5s ease-in-out 1s infinite; }
    @keyframes emojiPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.12); }
    }

    /* ── Headings ── */
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem; font-weight: 700; line-height: 1.45;
      color: #fff; margin-bottom: 2rem; letter-spacing: -0.01em;
      animation: fadeSlide 0.5s ease 0.2s both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Buttons ── */
    .btn {
      padding: 0.9rem 2rem; border-radius: 999px; border: none;
      font-size: 1rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.95) !important; }

    /* shimmer sweep */
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0s;
    }
    .btn:hover::before { left: 150%; transition: left 0.55s ease; }

    .btn-primary {
      background: linear-gradient(135deg, #9333ea, #db2777);
      color: #fff; width: 100%;
      box-shadow: 0 4px 24px rgba(147,51,234,0.4);
      animation: btnPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(147,51,234,0.55); }

    .btn-ghost {
      background: rgba(255,255,255,0.06); color: #d4b4fe;
      border: 1px solid rgba(168,85,247,0.28); width: 100%;
      animation: btnPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.45s both;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.11); transform: translateY(-2px); }

    @keyframes btnPop {
      from { opacity: 0; transform: scale(0.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── NO button (escaping) ── */
    .btn-no {
      background: rgba(255,255,255,0.05);
      color: #888; border: 1px solid rgba(255,255,255,0.1);
      position: fixed; z-index: 100;
      cursor: default;
      transition: left 0.7s cubic-bezier(0.25,1,0.5,1), top 0.7s cubic-bezier(0.25,1,0.5,1), opacity 0.3s;
    }

    /* ── Button group ── */
    .btn-group { display: flex; flex-direction: column; gap: 0.9rem; width: 100%; }

    /* ── Reveal box (step 2 "Ben bilirim") ── */
    .reveal-box {
      display: none;
      background: rgba(168,85,247,0.07);
      border: 1px solid rgba(168,85,247,0.22);
      border-radius: 18px;
      padding: 1.3rem 1.4rem;
      width: 100%; margin-top: 0.5rem;
      animation: stepIn 0.4s ease forwards;
      text-align: left;
    }
    .reveal-box.show { display: block; }

    .reveal-label {
      font-size: 0.82rem; color: #a78bfa; margin-bottom: 0.6rem; letter-spacing: 0.03em;
    }
    .reveal-input {
      width: 100%; background: rgba(0,0,0,0.25);
      border: 1.5px solid rgba(168,85,247,0.3);
      border-radius: 12px; padding: 0.8rem 1rem;
      color: #f0e6ff; font-size: 1rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    .reveal-input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168,85,247,0.2);
    }
    .reveal-input::placeholder { color: #554466; }

    /* ── Time picker ── */
    .time-picker {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,85,247,0.22);
      border-radius: 20px; padding: 1.2rem 2.2rem;
      margin-bottom: 1.8rem;
      box-shadow: inset 0 2px 14px rgba(0,0,0,0.25);
      animation: stepIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    .time-col { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .time-val {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem; font-weight: 700; color: #d8b4fe;
      min-width: 3rem; text-align: center; line-height: 1;
      transition: transform 0.15s, opacity 0.15s;
    }
    .time-val.bump { animation: numBump 0.2s ease; }
    @keyframes numBump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); color: #f0abfc; }
      100% { transform: scale(1); }
    }
    .time-sep { font-size: 2rem; color: #444; line-height: 1; padding-bottom: 4px; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .arrow {
      background: none; border: none; color: rgba(168,85,247,0.45);
      font-size: 1.1rem; cursor: pointer; padding: 0.3rem 0.8rem;
      border-radius: 10px; line-height: 1;
      transition: color 0.15s, background 0.15s, transform 0.15s;
    }
    .arrow:hover { color: #a855f7; background: rgba(168,85,247,0.13); transform: scale(1.2); }
    .arrow:active { transform: scale(0.9); }

    /* ── Summary ── */
    .summary {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px; padding: 1.4rem; width: 100%; margin-bottom: 1.8rem;
      text-align: left;
      animation: stepIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    .summary-row {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.55rem 0; color: #bbb; font-size: 0.95rem;
    }
    .summary-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .summary-row strong { color: #e9d5ff; margin-left: auto; text-align: right; }

    /* ── Heart ring ── */
    .heart-ring {
      position: absolute; inset: -18px; border-radius: 50%;
      border: 2px solid rgba(219,39,119,0.35);
      animation: heartRing 2.2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes heartRing {
      0%   { transform: scale(0.7); opacity: 0.9; }
      100% { transform: scale(1.8); opacity: 0; }
    }
    .heart-ring2 {
      position: absolute; inset: -18px; border-radius: 50%;
      border: 2px solid rgba(168,85,247,0.3);
      animation: heartRing 2.2s ease-out 1.1s infinite;
      pointer-events: none;
    }

    /* ── Intro screen ── */
    #introScreen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d0a14;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #introScreen.hide {
      opacity: 0; transform: scale(1.08); pointer-events: none; visibility: hidden;
    }

    .davet-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 700;
      color: #fff; letter-spacing: 0.08em;
      margin-top: 2rem;
      animation: fadeSlide 0.8s ease 0.4s both;
      text-align: center;
    }
    .davet-sub {
      font-size: 0.85rem; color: #a78bfa; margin-top: 0.5rem;
      animation: fadeSlide 0.8s ease 0.7s both;
    }

    /* ── Envelope ── */
    .envelope-wrap {
      position: relative; cursor: pointer;
      width: 200px; height: 140px;
      animation: envFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(147,51,234,0.4));
    }
    .envelope-wrap:hover { filter: drop-shadow(0 24px 50px rgba(219,39,119,0.55)); }
    @keyframes envFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    /* envelope body */
    .env-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(160deg, #2d1b4e, #1a0f2e);
      border-radius: 4px 4px 12px 12px;
      border: 1px solid rgba(168,85,247,0.3);
      overflow: hidden;
    }
    /* left & right flaps (decorative) */
    .env-body::before, .env-body::after {
      content: ''; position: absolute; bottom: 0;
      width: 0; height: 0;
    }
    .env-body::before {
      left: 0;
      border-style: solid;
      border-width: 0 0 120px 100px;
      border-color: transparent transparent rgba(59,17,99,0.6) transparent;
    }
    .env-body::after {
      right: 0;
      border-style: solid;
      border-width: 120px 0 0 100px;
      border-color: transparent transparent transparent rgba(59,17,99,0.6);
    }

    /* bottom V fold */
    .env-vfold {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 0; border-left: 100px solid transparent;
      border-right: 100px solid transparent;
      border-bottom: 68px solid rgba(80,30,130,0.5);
    }

    /* top flap */
    .env-flap {
      position: absolute; top: 0; left: 0; right: 0;
      height: 0;
      border-left: 100px solid transparent;
      border-right: 100px solid transparent;
      border-top: 75px solid #3b1163;
      transform-origin: top center;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      z-index: 3;
      pointer-events: none;
    }
    .envelope-wrap.open .env-flap {
      transform: rotateX(180deg);
    }

    /* letter inside */
    .env-letter {
      position: absolute; left: 20px; right: 20px;
      bottom: 10px; height: 90px;
      background: linear-gradient(135deg, #f5e6ff, #ffe4f0);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s, opacity 0.4s ease 0.3s;
      z-index: 2;
    }
    .envelope-wrap.open .env-letter {
      transform: translateY(-110px);
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed; pointer-events: none; z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(110vh) rotate(800deg) scale(0.5); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Intro -->
<div id="introScreen">
  <div class="envelope-wrap" id="envelope" onclick="openEnvelope()">
    <div class="env-letter">💌</div>
    <div class="env-body">
      <div class="env-vfold"></div>
    </div>
    <div class="env-flap"></div>
  </div>
  <div class="davet-text">DAVETİN VAR!</div>
  <div class="davet-sub">zarfa tıkla 💜</div>
</div>

<div class="card" id="mainCard">

  <div class="progress">
    <div class="dot active" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>

  <!-- Step 1 -->
  <div class="step active" id="step1">
    <span class="emoji">🍷</span>
    <h1>Alkol içmeye gelir misin?</h1>
    <div class="btn-group" id="step1Btns">
      <button class="btn btn-primary" onclick="hideNoBtn(); goTo(2)">Evet, tabii ki 🙌</button>
      <div id="noBtnPlaceholder" style="width:100%;height:52px;"></div>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="step" id="step2">
    <span class="emoji">😏</span>
    <h1>Cevabının evet olduğunu tahmin ediyorum. Öyleyse nereye gidelim?</h1>
    <div class="btn-group" id="s2btns">
      <button class="btn btn-primary" onclick="pickPlace('sen'); goTo(3)">Sen bilirsin ✨</button>
      <button class="btn btn-ghost" onclick="showMyAnswer()">Ben bilirim 🗺️</button>
    </div>
    <div class="reveal-box" id="revealBox">
      <div class="reveal-label">Nereye gitmek istiyorsun?</div>
      <input class="reveal-input" id="placeInput" type="text" placeholder="Bir yer yaz..." maxlength="60" />
      <button class="btn btn-primary" onclick="confirmPlace()">Tamam, gidiyoruz 💜</button>
    </div>
  </div>

  <!-- Step 3 -->
  <div class="step" id="step3">
    <span class="emoji">🕐</span>
    <h1>Seni saat kaçta alayım?</h1>
    <div class="time-picker">
      <div class="time-col">
        <button class="arrow" onclick="changeTime('h',1)">▲</button>
        <div class="time-val" id="hDisp">--</div>
        <button class="arrow" onclick="changeTime('h',-1)">▼</button>
      </div>
      <div class="time-sep">:</div>
      <div class="time-col">
        <button class="arrow" onclick="changeTime('m',1)">▲</button>
        <div class="time-val" id="mDisp">--</div>
        <button class="arrow" onclick="changeTime('m',-1)">▼</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="confirmTime()">Bu saatte hazır olacağım 🚗</button>
  </div>

  <!-- Step 4 -->
  <div class="step" id="step4">
    <span class="emoji emoji-pulse" style="position:relative">
      🎉
      <span class="heart-ring"></span>
      <span class="heart-ring2"></span>
    </span>
    <h1>Her şey tamamsa başlıyoruz!</h1>
    <div class="summary">
      <div class="summary-row">📍 Yer <strong id="sumPlace">—</strong></div>
      <div class="summary-row">🕐 Saat <strong id="sumTime">—</strong></div>
    </div>
    <button class="btn btn-primary" id="finishBtn" onclick="finish()">Hazırım! 🥂</button>
  </div>

</div>

<script>
  /* ── State ── */
  let chosenPlace = '';
  const now = new Date();
  let hour = now.getHours(), minute = now.getMinutes();
  let minHour = now.getHours(), minMinute = now.getMinutes();
  let currentStep = 1;

  /* ── Particles ── */
  /* ── Intro / envelope ── */
  function openEnvelope() {
    const env = document.getElementById('envelope');
    if (env.classList.contains('open')) return;
    env.classList.add('open');
    setTimeout(() => {
      document.getElementById('introScreen').classList.add('hide');
    }, 1000);
  }

  /* ── Init time display ── */
  document.getElementById('hDisp').textContent = String(hour).padStart(2,'0');
  document.getElementById('mDisp').textContent = String(minute).padStart(2,'0');

  const colors = ['#a855f7','#db2777','#ec4899','#7c3aed','#f472b6','#c084fc','#e879f9'];
  const pc = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 5 + 3;
    p.style.cssText = `width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*14+9}s;animation-delay:${Math.random()*12}s;`;
    pc.appendChild(p);
  }

  /* ── Navigation ── */
  function goTo(n) {
    if (n > 1) hideNoBtn();
    const cur = document.getElementById('step' + currentStep);
    cur.classList.add('exit');
    setTimeout(() => {
      cur.classList.remove('active','exit');
      currentStep = n;
      const next = document.getElementById('step' + n);
      next.classList.add('active');
      updateDots(n);
    }, 270);
  }

  function updateDots(n) {
    for (let i = 1; i <= 4; i++) {
      const d = document.getElementById('d' + i);
      d.className = 'dot' + (i===n?' active':i<n?' done':'');
    }
  }

  /* ── NO button — visually in card via placeholder, actually fixed ── */
  const noBtn = document.getElementById('noBtn');
  let escaped = false;

  function positionOnPlaceholder() {
    const ph = document.getElementById('noBtnPlaceholder');
    const rect = ph.getBoundingClientRect();
    noBtn.style.left   = rect.left   + 'px';
    noBtn.style.top    = rect.top    + 'px';
    noBtn.style.width  = rect.width  + 'px';
    noBtn.style.height = rect.height + 'px';
  }

  // suppress transition on initial placement
  noBtn.style.transition = 'none';
  window.addEventListener('load', () => {
    positionOnPlaceholder();
    requestAnimationFrame(() => {
      noBtn.style.transition = '';
    });
  });
  window.addEventListener('resize', () => { if (!escaped) positionOnPlaceholder(); });

  function escapeNoBtn() {
    if (escaped) { randomPlace(); return; }
    escaped = true;
    document.getElementById('noBtnPlaceholder').style.visibility = 'hidden';
    randomPlace();
  }

  function randomPlace() {
    const pad = 24;
    const bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
    const x = Math.random() * (window.innerWidth  - bw - pad*2) + pad;
    const y = Math.random() * (window.innerHeight - bh - pad*2) + pad;
    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';
  }

  noBtn.addEventListener('mouseenter', escapeNoBtn);
  noBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    escapeNoBtn();
  }, { passive: false });

  /* ── Step 2 ── */
  function pickPlace(type) {
    chosenPlace = type === 'sen' ? 'Sen bilirsin ✨' : '';
    hideNoBtn();
  }

  function showMyAnswer() {
    hideNoBtn();
    document.getElementById('s2btns').style.display = 'none';
    const box = document.getElementById('revealBox');
    box.classList.add('show');
    setTimeout(() => document.getElementById('placeInput').focus(), 300);
  }

  function confirmPlace() {
    const val = document.getElementById('placeInput').value.trim();
    if (!val) {
      document.getElementById('placeInput').style.borderColor = '#db2777';
      document.getElementById('placeInput').placeholder = 'Bir yer yazmadan geçemezsin 😄';
      return;
    }
    chosenPlace = val + ' 🗺️';
    goTo(3);
  }

  function hideNoBtn() {
    noBtn.style.opacity = '0';
    noBtn.style.pointerEvents = 'none';
    setTimeout(() => { noBtn.style.display = 'none'; }, 300);
  }

  /* ── Step 3: Time ── */
  function changeTime(unit, delta) {
    if (unit === 'h') {
      const next = (hour + delta + 24) % 24;
      if (next < minHour) return;
      hour = next;
      if (hour === minHour && minute < minMinute) { minute = minMinute; }
      const el = document.getElementById('hDisp');
      el.textContent = String(hour).padStart(2,'0');
      bump(el);
      const em = document.getElementById('mDisp');
      em.textContent = String(minute).padStart(2,'0');
    } else {
      const next = (minute + delta + 60) % 60;
      if (hour === minHour && next < minMinute && delta < 0) return;
      minute = next;
      const el = document.getElementById('mDisp');
      el.textContent = String(minute).padStart(2,'0');
      bump(el);
    }
  }

  function bump(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  // Swipe on time columns
  let ty = null, tu = null;
  document.querySelectorAll('.time-col').forEach((col, i) => {
    const unit = i === 0 ? 'h' : 'm';
    col.addEventListener('touchstart', e => { ty = e.touches[0].clientY; tu = unit; }, { passive: true });
    col.addEventListener('touchmove',  e => {
      if (ty === null) return;
      const dy = ty - e.touches[0].clientY;
      if (Math.abs(dy) > 18) { changeTime(tu, dy > 0 ? 1 : -1); ty = e.touches[0].clientY; }
    }, { passive: true });
    col.addEventListener('touchend', () => { ty = null; });
  });

  function confirmTime() {
    const t = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
    document.getElementById('sumPlace').textContent = chosenPlace || 'Sen bilirsin ✨';
    document.getElementById('sumTime').textContent  = t;
    goTo(4);
    setTimeout(launchConfetti, 450);
  }

  /* ── Supabase ── */
  const _sb = supabase.createClient(
    'https://ezkhyjbkbppzqsmoxnwj.supabase.co',
    'sb_publishable_9nx8LuAB5m5INNhuSmy5-g_3XtxaINK'
  );

  async function saveToSupabase() {
    const { error } = await _sb.from('cevaplar').insert({
      yer: chosenPlace || 'Sen bilirsin ✨',
      saat: `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`,
      tarih: new Date().toISOString()
    });
    if (error) console.error('Kayıt hatası:', error.message);
  }

  /* ── Step 4 ── */
  function finish() {
    document.querySelector('#step4 h1').textContent = 'Harika! Görüşürüz o zaman 🥂';
    document.querySelector('#step4 .emoji').textContent = '💜';
    document.getElementById('finishBtn').style.display = 'none';
    saveToSupabase();
    launchConfetti();
  }

  /* ── Confetti ── */
  const shapes = ['❤️','✨','🌸','💜','🎊','🍷','🌟','💫'];
  function launchConfetti() {
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
        el.style.cssText = `left:${Math.random()*100}vw;font-size:${Math.random()*20+12}px;animation-duration:${Math.random()*1.8+1.8}s;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 55);
    }
  }
</script>
</body>
</html>
